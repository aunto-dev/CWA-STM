<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM to Excel | Professional Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #13803a;
            --primary-gradient: linear-gradient(135deg, #13803a 0%, #0b5d2a 100%);
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-light);
            background-image: radial-gradient(circle at top right, #e8f5e9, transparent),
                              radial-gradient(circle at bottom left, #e8f5e9, transparent);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .converter-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }

        .card-header-custom {
            background: var(--primary-gradient);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        .card-header-custom i {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .card-body {
            padding: 45px;
        }

        .form-label {
            font-weight: 500;
            color: #444;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 15px;
            border: 2px solid #eee;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(19, 128, 58, 0.1);
        }

        .btn-convert {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 500;
            color: white;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(19, 128, 58, 0.2);
        }

        .btn-convert:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(19, 128, 58, 0.3);
            color: white;
            filter: brightness(1.1);
        }

        .step-number {
            background: var(--primary-color);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            margin-right: 10px;
        }

        .loading-overlay {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center px-3">
    <div class="converter-card">
        <div class="card-header-custom">
            <i class="fa-solid fa-file-invoice-dollar"></i>
            <h2 class="mb-0">STM to Excel</h2>
            <p class="opacity-75 mb-0">อัปโหลดไฟล์ PDF เพื่อแปลงข้อมูลทันที</p>
        </div>
        
        <div class="card-body">
            <form action="/convert" method="POST" enctype="multipart/form-data" id="uploadForm">
                <div class="mb-4">
                    <label class="form-label">
                        <span class="step-number">1</span>
                        เลือกไฟล์ PDF Statement
                    </label>
                    <input type="file" name="pdf_file" class="form-control" accept=".pdf" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">
                        <span class="step-number">2</span>
                        รหัสผ่านไฟล์ (ถ้ามี)
                    </label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px; border: 2px solid #eee;">
                            <i class="fa-solid fa-lock text-muted"></i>
                        </span>
                        <input type="password" name="password" class="form-control border-start-0" 
                               style="border-radius: 0 12px 12px 0;" placeholder="ระบุรหัสผ่าน">
                    </div>
                </div>

                <div class="d-grid mt-4" id="btnWrapper">
                    <button type="submit" class="btn btn-convert" id="submitBtn">
                        <i class="fa-solid fa-wand-magic-sparkles me-2"></i>
                        แปลงไฟล์และดาวน์โหลด Excel
                    </button>
                </div>

                <div class="loading-overlay" id="loading">
                    <div class="spinner-border text-success" role="status"></div>
                    <p class="mt-2 text-muted">กำลังประมวลผลไฟล์ของคุณ...</p>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('uploadForm');
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');

    // ฟังก์ชันอ่าน Cookie
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    form.onsubmit = function() {
        // 1. ซ่อนปุ่ม แสดง Spinner
        btn.style.display = 'none';
        loading.style.display = 'block';

        // 2. เคลียร์ Cookie เก่า
        document.cookie = "download_started=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

        // 3. เช็ค Cookie ทุก 1 วินาที
        const checkDownload = setInterval(function() {
            if (getCookie('download_started') === 'true') {
                clearInterval(checkDownload);
                
                // 4. เมื่อโหลดเสร็จ แสดงปุ่มกลับมา และซ่อน Spinner
                btn.style.display = 'block';
                loading.style.display = 'none';

                // เคลียร์ Cookie เพื่อการใช้งานครั้งต่อไป
                document.cookie = "download_started=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            }
        }, 1000);
    };
</script>

</body>
</html>
